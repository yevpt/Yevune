name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: fmt · clippy · test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 各独立 crate（server 为 workspace 根，contract 为独立 crate）
        crate: [server, contract]
    steps:
      - uses: actions/checkout@v4

      # 版本与 components 由仓库根 rust-toolchain.toml 决定（单一真相源）；
      # 该 action 会自动读取该文件并缓存构建产物。
      - name: 安装 Rust 工具链
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: ${{ matrix.crate }}

      - name: 格式检查
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --check

      - name: Clippy（警告即错误）
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: 测试
        working-directory: ${{ matrix.crate }}
        run: cargo test --locked
